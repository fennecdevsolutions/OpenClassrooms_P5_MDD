<mat-card class="theme-card">
    <mat-card-header>
        <mat-card-title>
            {{theme().title}}
        </mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <p>
            {{theme().description}}
        </p>
        <button mat-flat-button class="subscribe-btn" [disabled]="isSubscribed()" (click)="onSubscribe(theme().id)">
            @if(isSubscribed()){
            Déjà abonné
            }
            @if(!isSubscribed()){
            S'abonner
            }
        </button>
    </mat-card-content>

</mat-card>

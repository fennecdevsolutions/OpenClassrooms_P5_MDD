<app-header></app-header>
<div class="centered-container">
    <button mat-icon-button class="back-btn" routerLink="/" aria-label="Retour">
        <mat-icon>arrow_back</mat-icon>
    </button>
    <img class="logo-large">
    <h2>Se connecter</h2>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmitForm()" class="full-width-form">
        <mat-form-field appearance="outline">
            <mat-label>Nom d'utilisateur ou E-mail</mat-label>
            <input matInput formControlName="identifier" placeholder="john.dev">
        </mat-form-field>
        <mat-form-field appearance="outline">
            <mat-label>Mot de passe</mat-label>
            <input matInput [type]="hidePassword()? 'password' : 'text'" formControlName="password" placeholder="">
            <button mat-icon-button matSuffix (click)="togglePasswordVisibility($event)"
                [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hidePassword()">
                <mat-icon>{{hidePassword()? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
        </mat-form-field>
        <div class="error-container">
            @if (serverErrorMessage()) {
            <div class="server-error">
                {{ serverErrorMessage() }}
            </div>
            }
        </div>
        <button mat-raised-button type="submit" class="submit-btn" [disabled]="loginForm.invalid">
            Se connecter
        </button>

    </form>
</div>

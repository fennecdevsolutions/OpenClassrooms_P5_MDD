spring.application.name=mdd

#Tomcat configuration
server.port=3001


#Log level configuration
logging.level.root=error

#MySQL database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/mdd_db

spring.datasource.username=${MDD_DB_USERNAME}
#Temporary password to be set in env variables
spring.datasource.password=${MDD_DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#JWT Secret (To be configured in env variables)
# 32 characters long secret
JwtSecret=${JWT_SECRET_KEY}
jwt.expiration-period=3d